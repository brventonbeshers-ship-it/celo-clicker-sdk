name: Test Pipeline

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  pipeline:
    name: Pipeline (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - name: Configure Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Scaffold test project
        run: |
          mkdir pipeline-test && cd pipeline-test
          npm init -y

      - name: Install celo-clicker-sdk
        working-directory: pipeline-test
        run: npm install celo-clicker-sdk
        continue-on-error: true

      - name: Test require and enumerate
        working-directory: pipeline-test
        run: |
          node -e "
            const sdk = require('celo-clicker-sdk');
            console.log('Pipeline test on Node ${{ matrix.node-version }}');
            console.log('Loaded:', typeof sdk !== 'undefined');
            const keys = Object.keys(sdk);
            console.log('Exports:', keys.length);
            keys.forEach(k => console.log('  -', k, '(' + typeof sdk[k] + ')'));
          "
        continue-on-error: true

      - name: Audit dependencies
        working-directory: pipeline-test
        run: npm audit --omit=dev
        continue-on-error: true

      - name: Query npm for package info
        run: |
          npm view celo-clicker-sdk version
          npm view celo-clicker-sdk dist-tags
        continue-on-error: true
