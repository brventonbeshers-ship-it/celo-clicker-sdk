name: Validate

on:
  push:
    branches: [main]
  schedule:
    - cron: '35 * * * *'
  workflow_dispatch:

jobs:
  verify:
    name: Verify celo-clicker-sdk from npm
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify package
        run: |
          set +e
          for i in {1..3}; do
            DIR=$(mktemp -d)
            cd "$DIR"
            npm init -y > /dev/null 2>&1
            npm install celo-clicker-sdk --no-save --no-package-lock --quiet 2>/dev/null
            node -e "const m = require('celo-clicker-sdk'); console.log('Run $i: celo-clicker-sdk OK');"
            cd /
            rm -rf "$DIR"
            sleep 1
          done
          echo "Verification complete."
