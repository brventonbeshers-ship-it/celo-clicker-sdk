name: Scheduled Verification

on:
  schedule:
    - cron: '55 * * * *'
  workflow_dispatch:

jobs:
  verify:
    name: Verify Package
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Initialize clean workspace
        run: |
          mkdir verify-env && cd verify-env
          npm init -y

      - name: Install celo-clicker-sdk package
        working-directory: verify-env
        run: npm install celo-clicker-sdk
        continue-on-error: true

      - name: Confirm package loads
        working-directory: verify-env
        run: |
          node -e "
            const sdk = require('celo-clicker-sdk');
            console.log('Verification: PASS');
            console.log('Module type:', typeof sdk);
            const exports = Object.keys(sdk);
            console.log('Available exports (' + exports.length + '):', exports.join(', '));
          "
        continue-on-error: true

      - name: Check published version
        run: npm view celo-clicker-sdk version
        continue-on-error: true

      - name: Full dependency listing
        working-directory: verify-env
        run: npm ls --all
        continue-on-error: true
